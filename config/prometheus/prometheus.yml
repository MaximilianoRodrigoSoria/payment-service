global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'payment-service'
    metrics_path: '/payment-service/actuator/prometheus'
    static_configs:
      - targets: ['paymentservice-app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'payment-service'
