apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: payment-service
  labels:
    app.kubernetes.io/name: payment-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Escala cuando el CPU promedio supere 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Escala cuando la memoria promedio supere 80%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # Espera 2 min antes de reducir réplicas
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0    # Escala hacia arriba sin espera
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
